<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>title</title>
    <link rel="stylesheet" href="rps.css">
  </head>
  <body>

        <h1>Rock Paper Scissors</h1>

        <div class="images">
            
            <div class="image" id="rock">
                <img src="https://sihoonathan.github.io/rock-paper-scissors/assets/img/rock2.png" height="148px">
            </div>

            <div class="image" id="paper">
                <img src="paper.png" height="148px">
            </div>

            <div class="image" id="scissor">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQUkJIrVbUlCAsKJR7rorApJ_Ynp72n4jWTMg&s" height="148px">
            </div>

        </div>


        <div class="scorecard">
            
            <div class="your">
                <p class="score" id="score1">0</p>
                <p id="p2">You</p>
            </div>

            <div class="computer">
                <p class="score" id="score2">0</p>
                <p id="p2">Computer</p>
            </div>
        </div>

        <div class="pick">
            <p class="picki">Pick your move</p>
        </div>

    <script src="rps.js"></script>
  </body>
</html>
